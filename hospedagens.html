<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Care.All</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
    }

    body{
      background:#f8f1f1;
      color:#2b2b2b;
    }

    img{
      max-width:100%;
      display:block;
    }

    header{
      width:100%;
      background:#7b2d2d;
      padding:18px 7%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
      gap:20px;
      position:sticky;
      top:0;
      z-index:1000;
    }

    .logo{
      color:white;
      font-size:40px;
      font-weight:700;
      text-decoration: none;
    }

    a {
        text-decoration: none;
    }

    nav{
      display:flex;
      gap:30px;
    }

    nav a{
      text-decoration:none;
      color:white;
      font-weight:500;
    }

    .search{
      width:200px;
      padding:12px 18px;
      border:none;
      border-radius:30px;
      outline:none;
    }

    .menu-hamburguer{
        color: #ffffff;
    }

    footer{
      background:#7b2d2d;
      color:white;
      margin-top:100px;
      padding:70px 8%;
    }

    .footer-grid{
      display:flex;
      justify-content:space-between;
      gap:40px;
      flex-wrap:wrap;
    }

    .footer-column h3{
      margin-bottom:20px;
      font-size:24px;
    }

    .footer-column p{
      margin-bottom:12px;
      opacity:0.9;
    }

    .social-icons {
        display: flex;
        gap: 15px;
        align-items: center;
    }

    .social-icons img {
        width: 40px;
        height: 40px;
        object-fit: contain;
        cursor: pointer;
        border-radius: 25%;
    }

    .copy{
      margin-top:50px;
      text-align:center;
      opacity:0.8;
    }
  </style>
</head>

<body>

<header>
  <a href="index.html">
    <div class="logo">Care.All</div>
  </a>

  <nav>
    <a href="sobre.html">Sobre</a>
    <a href="sobre.html">Hospedagens</a>
    <a href="projetos.html">Projetos</a>
    <a href="contato.html">Contato</a>
  </nav>

  <input type="text" class="search" placeholder="Buscar hospedagem...">

  <div class="menu-hamburguer" id="menu-hamburguer">☰</div>
</header>

<main>
    
</main>

<footer>

  <div class="footer-grid">

    <div class="footer-column">
      <h3>Sobre</h3>
      <p>Quem somos</p>
      <p>Nossa missão</p>
      <p>Impacto social</p>
    </div>

    <div class="footer-column">
      <h3>Ajuda</h3>
      <p>Central de suporte</p>
      <p>Perguntas frequentes</p>
    </div>

    <div class="footer-column">
      <h3>Contato</h3>
      <p>contato@careall.com</p>
      <p>(81) 99999-9999</p>
    </div>

    <div class="footer-column">
      <h3>Siga-nos</h3>
      <div class="social-icons">
        <img src="imagens/youtube.webp" alt="youtube_logo">
        <img src="imagens/facebook.png" alt="facebook_logo">
        <img src="imagens/instagram.webp" alt="instagram_logo"></p>
       </div>
    </div>

  </div>

  <div class="copy">
    © 2025 Care.All — Todos os direitos reservados
  </div>

</footer>

</body>
</html>
